# Orchestrates automated OpenAPI connector update workflows across multiple
# Ballerina connector repositories.
#
# Workflow overview:
#   1. Receives a list of connector update requests via repository_dispatch.
#   2. Triggers connector regeneration workflows in each target repository.
#   3. Waits for generated Pull Requests to be created.
#   4. Collects PR details, build status, version information, and code owners.
#   5. Generates and sends a consolidated HTML email summary report.
#   6. Uploads workflow artifacts and publishes a GitHub Actions summary.
#
# This workflow acts as the central orchestration layer for large-scale
# automated connector dependency and OpenAPI specification updates.

name: Orchestrate Connector Updates

on:
  repository_dispatch:
    types: [orchestrate-connector-updates]

jobs:
  orchestrate-updates:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.BALLERINA_BOT_TOKEN }}

    steps:
      - name: Checkout ballerina-library
        uses: actions/checkout@v4

      - name: Initialize workflow state
        run: echo "WORKFLOW_STATUS=success" >> $GITHUB_ENV

      - name: Capture workflow start time
        id: start_time
        run: |
          START_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "workflow_start_time=$START_TIME" >> $GITHUB_OUTPUT
          echo "Workflow started at: $START_TIME"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Parse connector updates
        id: parse_connectors
        env:
          CONNECTORS_DISPATCH: ${{ toJson(github.event.client_payload.connectors) }}
        run: |
          CONNECTORS="$CONNECTORS_DISPATCH"

          echo "Received connectors payload:"
          echo "$CONNECTORS" | jq '.'

          echo "$CONNECTORS" > connectors_to_update.json

          CONNECTOR_COUNT=$(echo "$CONNECTORS" | jq 'length')
          echo "Total connectors to update: $CONNECTOR_COUNT"
          echo "connector_count=$CONNECTOR_COUNT" >> $GITHUB_OUTPUT

          if [ "$CONNECTOR_COUNT" -eq 0 ]; then
            echo "No connectors to update"
            echo "WORKFLOW_STATUS=failed" >> $GITHUB_ENV
            exit 1
          fi

      - name: Trigger all connector regenerations
        id: trigger_connectors
        run: |
          echo "Workflow start time: ${{ steps.start_time.outputs.workflow_start_time }}"
          bash connector_automator/resources/scripts/trigger_connectors.sh \
            connectors_to_update.json triggered_connectors.txt || {
            echo "WORKFLOW_STATUS=failed" >> $GITHUB_ENV
            exit 1
          }

      - name: Wait for connector updates to complete
        if: steps.trigger_connectors.outputs.triggered_count > 0
        env:
          GH_TOKEN: ${{ secrets.BALLERINA_BOT_TOKEN }}
        run: |
          bash connector_automator/resources/scripts/wait_for_prs.sh \
            triggered_connectors.txt \
            "${{ steps.start_time.outputs.workflow_start_time }}"

      - name: Collect all connector PR information
        if: steps.trigger_connectors.outputs.triggered_count > 0
        id: collect_prs
        env:
          GH_TOKEN: ${{ secrets.BALLERINA_BOT_TOKEN }}
        run: |
          bash connector_automator/resources/scripts/collect_pr_info.sh \
            triggered_connectors.txt \
            "${{ steps.start_time.outputs.workflow_start_time }}" \
            connector_prs.json

      - name: Generate email HTML content
        if: steps.trigger_connectors.outputs.triggered_count > 0
        id: generate_email
        run: |
          bash connector_automator/resources/scripts/generate_email_html.sh \
            connector_prs.json \
            '${{ toJson(github.event.client_payload.malformed_specs) }}' \
            email_body.html \
            email_table_rows.html

      - name: Check email secrets
        if: steps.trigger_connectors.outputs.triggered_count > 0
        id: check_email_secrets
        run: |
          if [ -z "${{ secrets.EMAIL_USERNAME }}" ] || [ -z "${{ secrets.EMAIL_PASSWORD }}" ]; then
            echo "WARNING: Email secrets (EMAIL_USERNAME or EMAIL_PASSWORD) are not configured"
            echo "email_configured=false" >> $GITHUB_OUTPUT
          else
            echo "Email secrets are configured"
            echo "email_configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up Ballerina for email
        if: steps.trigger_connectors.outputs.triggered_count > 0 && steps.check_email_secrets.outputs.email_configured == 'true'
        uses: ballerina-platform/setup-ballerina@v1.1.3
        with:
          version: latest

      - name: Send consolidated email
        if: steps.trigger_connectors.outputs.triggered_count > 0 && steps.check_email_secrets.outputs.email_configured == 'true'
        continue-on-error: true
        id: send_email
        env:
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.NOTIFICATION_EMAIL_RECIPIENTS }}
          EMAIL_SUBJECT: ${{ steps.generate_email.outputs.email_subject }}
        run: |
          EMAIL_PKG=$(mktemp -d)
          cp connector_automator/resources/scripts/send_email.bal "$EMAIL_PKG/"
          cat > "$EMAIL_PKG/Ballerina.toml" << 'TOML'
          [package]
          org = "temp"
          name = "email_runner"
          version = "0.1.0"
          TOML
          bal run "$EMAIL_PKG" -- \
            "$EMAIL_SUBJECT" \
            "$(pwd)/email_body.html" \
            "$EMAIL_RECIPIENTS" \
            "$EMAIL_USERNAME" \
            "smtp.gmail.com"
          rm -rf "$EMAIL_PKG"

      - name: Check email outcome
        if: steps.trigger_connectors.outputs.triggered_count > 0
        run: |
          if [ "${{ steps.send_email.outcome }}" = "success" ]; then
            echo "Email sent successfully"
          elif [ "${{ steps.send_email.outcome }}" = "skipped" ]; then
            echo "Email step was skipped (secrets not configured)"
          else
            echo "ERROR: Email sending failed"
            echo "WORKFLOW_STATUS=failed" >> $GITHUB_ENV
          fi

      - name: Upload artifacts
        if: steps.trigger_connectors.outputs.triggered_count > 0
        uses: actions/upload-artifact@v4
        with:
          name: connector-update-summary-${{ github.run_id }}
          path: |
            connector_prs.json
            triggered_connectors.txt
            email_table_rows.html
            email_body.html
            connectors_to_update.json

      - name: Summary
        if: always()
        run: |
          echo "## Connector Update Orchestration Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "triggered_connectors.txt" ]; then
            TRIGGERED=$(wc -l < triggered_connectors.txt)
            echo "**Triggered:** $TRIGGERED connectors" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "connector_prs.json" ]; then
            COLLECTED=$(jq 'length' connector_prs.json)
            COMPLETED=$(jq '[.[] | select(.pr.number > 0)] | length' connector_prs.json)
            FAILED=$(jq '[.[] | select(.buildStatus == "FAILED" or .buildStatus == "Workflow Failed")] | length' connector_prs.json)

            echo "**Collected:** $COLLECTED connector reports" >> $GITHUB_STEP_SUMMARY
            echo "**Completed:** $COMPLETED with PRs created" >> $GITHUB_STEP_SUMMARY
            echo "**Failed (individual connectors):** $FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Email Status:** ${{ steps.send_email.outcome || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow Status:** $WORKFLOW_STATUS" >> $GITHUB_STEP_SUMMARY

      - name: Fail workflow if critical step failed
        if: always()
        run: |
          if [ "$WORKFLOW_STATUS" = "failed" ]; then
            echo "Workflow failed due to a critical step failure (trigger or email). See logs above."
            exit 1
          fi
          echo "Workflow completed successfully"
