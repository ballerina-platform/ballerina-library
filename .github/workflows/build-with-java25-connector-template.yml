name: Build with Java 25 (Connector)

on:
  workflow_call:
    inputs:
      additional-build-flags:
        required: false
        type: string
        default: ""
      additional-test-flags:
        required: false
        type: string
        default: ""

# The build and test commands are in separate steps to switch the JDK between compilation (JDK 21)
# and test execution (JDK 25). Compilation must not use JDK 25.
jobs:
  build:
    name: Build and Test on JDK 25
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Get Ballerina Version
        run: |
          BAL_VERSION=$(grep -w 'ballerinaLangVersion' gradle.properties | cut -d= -f2 | rev | cut --complement -d- -f1 | rev)
          if [ -z "$BAL_VERSION" ]; then
            BAL_VERSION="latest"
          fi
          echo "BAL_VERSION=$BAL_VERSION" >> $GITHUB_ENV
          echo "Ballerina Version: $BAL_VERSION"

      - name: Set Up Ballerina
        uses: ballerina-platform/setup-ballerina@v1.1.3
        with:
          version: ${{ env.BAL_VERSION }}

      # --- Phase 1: compile on JDK 21 ---
      - name: Set up JDK 21 (compile)
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 21.0.3

      - name: Set ENV Variables
        run: |
          echo -e '${{ toJson(secrets) }}' | jq -r 'to_entries[] | .key + "=" + .value' >> $GITHUB_ENV
          echo "CENTRAL_VERBOSE_ENABLED=true" >> $GITHUB_ENV

      - name: Build (JDK 21)
        env:
          packageUser: ${{ github.actor }}
          packagePAT: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew build -x test ${{ inputs.additional-build-flags }}

      # --- Phase 2: run tests on JDK 25 ---
      - name: Set up JDK 25 (test)
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '25'

      # Gradle 8.11.x fails to configure Checkstyle tasks on Java 25 (DefaultReportContainer
      # reflection issue). Gradle 8.12 backported the fix while keeping APIs the Ballerina
      # Gradle plugin depends on (project.exec, sourceCompatibility, ConfigureUtil, etc.)
      # that were removed in Gradle 9.
      - name: Upgrade Gradle wrapper for Java 25 compatibility
        run: |
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.12.1-bin.zip|' \
            gradle/wrapper/gradle-wrapper.properties

          # Pin all Java compilation to JDK 21 via a toolchain. Without this, Gradle
          # defaults compilation to whatever JDK runs the daemon (JDK 25 here), producing
          # Java 25 bytecode for subprojects that have no explicit sourceCompatibility.
          # The toolchain makes Gradle find and use the JDK 21 installed in phase 1.
          # Ballerina tests are unaffected: bal test spawns its own JVM and picks up
          # JAVA_HOME (JDK 25), so Ballerina code is tested on the target runtime.
          cat > /tmp/gradle9-compat.init.gradle << 'INIT_EOF'
          gradle.beforeProject { project ->
              project.plugins.withType(org.gradle.api.plugins.JavaPlugin) {
                  project.java.toolchain {
                      languageVersion = org.gradle.jvm.toolchain.JavaLanguageVersion.of(21)
                  }
              }
          }
          INIT_EOF

      - name: Test (JDK 25)
        env:
          packageUser: ${{ github.actor }}
          packagePAT: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew test --init-script /tmp/gradle9-compat.init.gradle ${{ inputs.additional-test-flags }}
