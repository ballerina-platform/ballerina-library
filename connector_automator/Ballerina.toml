[package]
org = "wso2"
name = "connector_automator"
version = "0.1.0"
distribution = "2201.13.1"

[build-options]
observabilityIncluded = true

[dependencies]
"ballerina/ai" = "1.11.2"
"ballerinax/ai.anthropic" = "1.3.3"
"ballerina/http" = "2.15.4"
"ballerina/log" = "2.17.0"
"ballerina/regex" = "1.4.1"
"ballerina/time" = "2.4.1"
"ballerina/file" = "1.12.0"
"ballerina/io" = "1.8.0"
"ballerina/os" = "1.9.0"
"ballerina/jballerina.java" = "0.0.0"
"ballerina/yaml" = "0.8.0"
"ballerina/data.jsondata" = "1.1.3"

[[platform.java21.dependency]]
groupId = "io.ballerina.connector.automator.sdkanalyzer"
artifactId = "native"
version = "0.1.0"
path = "./modules/sdkanalyzer/native/build/libs/native-0.1.0.jar"
